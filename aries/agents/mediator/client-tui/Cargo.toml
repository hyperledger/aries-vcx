[package]
name = "client-tui"
version = "0.1.1"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[features]
# default = ["vdrtools_wallet"]
vdrtools_wallet = ["aries_vcx_core/vdrtools_wallet", "aries_vcx_wallet/vdrtools_wallet"]
askar_wallet = ["aries_vcx_core/askar_wallet", "aries_vcx_wallet/askar_wallet"]

[dependencies]
aries_vcx_core = { path = "../../../aries_vcx_core", default-features = false }
aries_vcx_wallet = { path = "../../../aries_vcx_wallet", default-features = false }
axum = "0.6.20"
cursive = { version = "0.20.0", features = ["crossterm-backend"] }
futures = "0.3.28"
log = "0.4.20"
mediator = { path = ".." }
messages = { path = "../../../messages" }
reqwest = "0.11.22"
serde_json = "1.0.107"

tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
