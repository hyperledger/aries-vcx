[package]
name = "mediator"
version = "0.1.1"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
default = ["client"]
client = []
vdrtools_wallet = ["aries_vcx/vdrtools_wallet", "aries_vcx_core/vdrtools_wallet", "aries_vcx_wallet/vdrtools_wallet"]
askar_wallet = ["aries_vcx/askar_wallet", "aries_vcx_core/askar_wallet", "aries_vcx_wallet/askar_wallet"]

[dependencies]
anyhow = "1.0.75"
aries_vcx = { path = "../../aries_vcx", default-features = false }
aries_vcx_core = { path = "../../aries_vcx_core", default-features = false }
aries_vcx_wallet = { path = "../../aries_vcx_wallet",  default-features = false }
async-trait = "0.1.73"
axum = "0.6"
axum-macros = "0.3.8"
diddoc_legacy = { path = "../../misc/legacy/diddoc_legacy" }
dotenvy = "0.15"
env_logger = "0.10.0"
fast_qr = { version = "0.10.2", features = ["svg"] }
futures = "0.3.28"
log = "0.4.20"
messages = { path = "../../messages" }
reqwest = { version = "0.11.20", features = ["json"] }
serde = "1.0.188"
serde_json = "1.0.106"
sqlx = "0.7"
thiserror = "1.0.49"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tower-http = { version = "0.4.4", features = ["catch-panic"] }
url = "2.4.1"
uuid = "1.4.1"
test_utils = { path = "../../misc/test_utils", default-features = false }
base64-url = "2.0.0"

[dev-dependencies]
base64-url = "2.0.0"
chrono = "0.4.31"
reqwest = { version = "0.11.20", features = ["blocking"] }
